<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das imagens</title>
</head>

<body>
<h1>Vila Velha</h1>
<figure>
<p>Pontos turísticos de Vila Velha</p>
<img src="imagem.jpg" alt="Imagem da pedra do Parque de Vila Velha">
<figcaption>Pedra do parque de Vila Velha</figcaption>
</figure>

<picture>
    <source media="(max-width: 200px)" srcset="imagem.jpg">
    <source media="(min-width: 100px )" srcset="imagem.jpg" 
</picture>
</body>
</html>
