<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <title>Aula imagens</title>
</head>
<body>
<h1>Desafio das imagens</h1>
<h2>Vila Velha</h2>
<figure>
    <img src="convento_da_penha.jpg" alt="Convento da penha a tarde">
    <figcaption>Foto do convento da penha ao entardecer</figcaption>
</figure>
<hr>
<figure>
    <picture>
        <source media="(max-width: 767px )" srcset="Convento-da-Penha-2.jpg">
        <source media="(min-width: 768px )" srcset="Convento-da-Penha-2P.jpg">
     <img src="Convento-da-Penha-2.jpg" alt="foto do convento da penha ao meio dia">
    <figcaption>Foto do convento da penha tirada ao meio dia</figcaption>
    </picture>
</figure>
</body>
</html>
