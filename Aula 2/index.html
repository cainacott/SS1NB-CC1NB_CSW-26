<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="img/favicon-16x16.png">
    <title>Aula imagens</title>
</head>
<body>
<h1>Desafio das imagens</h1>
<h2>Vila Velha</h2>
<figure>
    <img src="img/convento_da_penha.jpg" width="800px" alt="Convento da penha a tarde">
    <figcaption>Foto do convento da penha ao entardecer</figcaption>
</figure>
<hr>
<figure>
    <picture>
        <source media="(min-width:900px)" srcset="img/Convento_por_yuri.jpg">
        <source media="(max-width:600px)" srcset="img/Convento-da-Penha-2.jpg">
     <img src="img/Convento-da-Penha-2.jpg" width="100%" alt="foto do convento da penha ao meio dia">
    <figcaption>Foto do convento da penha tirada ao meio dia</figcaption>
    </picture>
</figure>
</body>
</html>
